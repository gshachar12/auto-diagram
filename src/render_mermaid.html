<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0;
            padding: 0;
            background: #ffffff; 
            display: flex;
            flex-direction: column; 
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #controls-panel {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }

        #diagram-viewport { 
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
        }

        #mermaid-container {
            width: 100%;
            height: 100%;
        }

        #evidence-tooltip {
            position: absolute;
            display: none;
            background: rgba(33, 37, 41, 0.95);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 2000;
            max-width: 300px;
            border: 1px solid #444;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            line-height: 1.4;
        }

        small {
            font-size: 0.85em;
            color: #666;
        }
    </style>
</head>
<body>

    <div id="controls-panel">
        <i class="fas fa-search-plus"></i>
        <input type="range" id="zoom-range" min="1" max="100" value="10">
        <div style="font-weight: 600;">{{TITLE}}</div>
    </div>

    <div id="diagram-viewport">
        <div id="evidence-tooltip"></div>
        <div id="mermaid-container" class="mermaid">
            {{SLICED_CODE}}
        </div>
    </div>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

        const packetLookup = {{PACKETS_JSON}};

        mermaid.initialize({ 
            startOnLoad: true,
            theme: 'default',
            securityLevel: 'loose',
            sequence: { 
                autonumber: true,
                useMaxWidth: false,
                wrap: true,
                width: 200,
                messageFontWeight: 400
            } 
        });

        const zoomSlider = document.getElementById('zoom-range');
        const tooltip = document.getElementById('evidence-tooltip');

        function setupInteractivity() {
            const svg = document.querySelector('#mermaid-container svg');
            if (!svg) { 
                setTimeout(setupInteractivity, 200); 
                return; 
            }

            svg.style.height = '100%';
            svg.style.width = '100%';
            
            window.panZoom = svgPanZoom(svg, {
                zoomEnabled: true,
                controlIconsEnabled: false,
                fit: true,
                center: true,
                onZoom: (val) => { zoomSlider.value = val * 10; }
            });

            zoomSlider.oninput = function() {
                window.panZoom.zoom(this.value / 10);
            };

            const interactiveElements = svg.querySelectorAll(
                '.messageGroup, .noteGroup, .messageText, .noteText'
            );

            interactiveElements.forEach(el => {
                el.style.cursor = 'help';
                
                el.addEventListener('mouseenter', (e) => {
                    const text = el.textContent || "";
                    const matches = text.match(/\d+/g);

                    if (matches) {
                        const htmlContent = matches
                            .filter(id => packetLookup[id])
                            .map(id => `<strong>📦 Packet #${id}</strong>: ${packetLookup[id]}`)
                            .join('<hr style="border:0; border-top:1px solid #555; margin:5px 0;">');

                        if (htmlContent) {
                            tooltip.style.display = 'block';
                            tooltip.innerHTML = htmlContent;
                        }
                    }
                });

                el.addEventListener('mousemove', (e) => {
                    tooltip.style.left = (e.clientX + 15) + 'px';
                    tooltip.style.top = (e.clientY + 15) + 'px';
                });

                el.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });
            });
        }

        setTimeout(setupInteractivity, 800);
    </script>
</body>
</html>
